<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fretboard Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #121212; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 10px; }
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: #121212; overflow: hidden; }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px #06b6d4; }
            50% { box-shadow: 0 0 20px #06b6d4, inset 0 0 10px #06b6d4; }
            100% { box-shadow: 0 0 5px #06b6d4; }
        }
        @keyframes teacherBounce {
            0% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-3px) rotate(-5deg); }
            50% { transform: translateY(0px) rotate(0deg); }
            75% { transform: translateY(-3px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- SVG Icons ---
        const IconTimer = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconAlert = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconPlay = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconRotate = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>;
        const IconTrophy = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconXCircle = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
        const IconMusic = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;
        const IconMaximize = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>;
        const IconMinimize = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>;
        const IconSkull = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></svg>;

        // --- Konstanten & Logik ---
        const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'H'];
        const STRING_TUNINGS = [4, 11, 7, 2, 9, 4];
        const NUM_FRETS = 17; 
        const NUT_WIDTH = 70; 
        const PIXEL_SCALE_LENGTH = 2800; 

        const getStratocasterFretWidths = () => {
            const widths = [];
            for (let i = 1; i <= NUM_FRETS; i++) {
                const distPrev = i === 1 ? 0 : PIXEL_SCALE_LENGTH - (PIXEL_SCALE_LENGTH / Math.pow(2, (i - 1) / 12));
                const distCurr = PIXEL_SCALE_LENGTH - (PIXEL_SCALE_LENGTH / Math.pow(2, i / 12));
                widths.push(distCurr - distPrev);
            }
            return widths;
        };
        const FRET_WIDTHS = getStratocasterFretWidths();

        const getScaleNotes = (rootNote, scaleType) => {
            const rootIdx = NOTES.indexOf(rootNote);
            const intervals = scaleType === 'Dur' ? [0, 2, 4, 5, 7, 9, 11] : [0, 2, 3, 5, 7, 8, 10];
            return intervals.map(interval => NOTES[(rootIdx + interval) % 12]);
        };

        // NoteMarker mit Player & Teacher UI
        const NoteMarker = ({ isFound, isWrong, note, isPlayer, isTeacher }) => {
            return (
                <div className="relative flex items-center justify-center pointer-events-none">
                    {isFound && (
                        <div className="absolute z-20 w-8 h-8 md:w-10 md:h-10 rounded-full bg-emerald-500 border-2 border-slate-900 flex items-center justify-center text-sm md:text-base font-bold text-white shadow-[0_0_10px_rgba(16,185,129,0.8)]">
                            {note}
                        </div>
                    )}
                    {isWrong && (
                        <div className="absolute z-20 w-8 h-8 md:w-10 md:h-10 rounded-full bg-rose-500 border-2 border-slate-900 flex items-center justify-center shadow-[0_0_15px_rgba(244,63,94,0.8)]" style={{animation: 'zoomIn 0.15s ease-out forwards'}}>
                            <IconXCircle size={20} className="text-white" />
                        </div>
                    )}
                    
                    {/* Der Spieler (blauer Leuchtkreis) */}
                    {isPlayer && (
                        <div className="absolute z-30 w-12 h-12 md:w-14 md:h-14 rounded-full border-4 border-cyan-400 pointer-events-none" style={{animation: 'pulseGlow 1.5s infinite'}}></div>
                    )}

                    {/* Der Musiklehrer (Emoji) */}
                    {isTeacher && (
                        <div className="absolute z-40 w-12 h-12 md:w-14 md:h-14 flex items-center justify-center pointer-events-none" style={{animation: 'teacherBounce 0.8s infinite'}}>
                            <span className="text-3xl md:text-4xl drop-shadow-[0_0_8px_rgba(244,63,94,0.9)]">👨‍🏫</span>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            // Spielzustände
            const [gameState, setGameState] = useState('idle'); // idle, playing, won, lost
            const [gameMode, setGameMode] = useState('classic'); // 'classic' oder 'chase'
            const [currentScale, setCurrentScale] = useState({ root: 'C', type: 'Dur' });
            const [targetNotes, setTargetNotes] = useState([]);
            const [totalTargetCount, setTotalTargetCount] = useState(0);
            
            const [foundNotes, setFoundNotes] = useState([]);
            const [mistakes, setMistakes] = useState(0);
            const [timeElapsed, setTimeElapsed] = useState(0);
            
            // Verfolgungsjagd Zustände
            const [playerPos, setPlayerPos] = useState(null);
            const [teacherPos, setTeacherPos] = useState(null);
            const [teacherSpeed, setTeacherSpeed] = useState(1500); // ms per move
            
            const [feedbackMsg, setFeedbackMsg] = useState(null);
            const [wrongNoteId, setWrongNoteId] = useState(null);
            const [isFullscreen, setIsFullscreen] = useState(false);

            // Refs für Timer, da Intervalle in React sonst stale State verwenden
            const playerPosRef = useRef(null);
            useEffect(() => { playerPosRef.current = playerPos; }, [playerPos]);

            // Vollbild Listener
            useEffect(() => {
                const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => console.log(e));
                else document.exitFullscreen();
            };

            const calculateTotalTargets = useCallback((notes) => {
                let count = 0;
                for (let s = 0; s < 6; s++) {
                    for (let f = 0; f <= NUM_FRETS; f++) {
                        const noteIdx = (STRING_TUNINGS[s] + f) % 12;
                        if (notes.includes(NOTES[noteIdx])) count++;
                    }
                }
                return count;
            }, []);

            const startGame = () => {
                const randomRoot = NOTES[Math.floor(Math.random() * NOTES.length)];
                const randomType = Math.random() > 0.5 ? 'Dur' : 'Moll';
                const scaleNotes = getScaleNotes(randomRoot, randomType);
                
                setCurrentScale({ root: randomRoot, type: randomType });
                setTargetNotes(scaleNotes);
                setTotalTargetCount(calculateTotalTargets(scaleNotes));
                setFoundNotes([]);
                setMistakes(0);
                setTimeElapsed(0);
                setPlayerPos(null);
                setTeacherPos(null);
                setTeacherSpeed(1500);
                setGameState('playing');
                setFeedbackMsg(null);
                setWrongNoteId(null);
            };

            // Global Stopwatch Timer
            useEffect(() => {
                let timer;
                if (gameState === 'playing') {
                    timer = setInterval(() => setTimeElapsed(prev => prev + 1), 1000);
                }
                return () => clearInterval(timer);
            }, [gameState]);

            // Sieg-Bedingung
            useEffect(() => {
                if (gameState === 'playing' && foundNotes.length > 0 && foundNotes.length === totalTargetCount) {
                    setGameState('won');
                }
            }, [foundNotes, totalTargetCount, gameState]);

            // Niederlage-Bedingung (Lehrer fängt Spieler)
            useEffect(() => {
                if (gameState === 'playing' && gameMode === 'chase' && teacherPos && playerPos) {
                    if (teacherPos.s === playerPos.s && teacherPos.f === playerPos.f) {
                        setGameState('lost');
                    }
                }
            }, [teacherPos, playerPos, gameState, gameMode]);

            // Musiklehrer Bewegungs-Interval
            useEffect(() => {
                if (gameState !== 'playing' || gameMode !== 'chase' || !teacherPos) return;

                const timer = setInterval(() => {
                    setTeacherPos(prev => {
                        const target = playerPosRef.current;
                        if (!prev || !target) return prev;
                        
                        let ns = prev.s; let nf = prev.f;
                        // Gieriger Algorithmus (Greedy) geht immer einen Schritt Richtung Spieler
                        if (ns < target.s) ns++; else if (ns > target.s) ns--;
                        if (nf < target.f) nf++; else if (nf > target.f) nf--;
                        
                        return { s: ns, f: nf };
                    });
                }, teacherSpeed);

                return () => clearInterval(timer);
            }, [gameState, gameMode, teacherSpeed, teacherPos !== null]);

            // Feedback Timer
            useEffect(() => {
                if (wrongNoteId || feedbackMsg) {
                    const timer = setTimeout(() => {
                        setWrongNoteId(null);
                        setFeedbackMsg(null);
                    }, 1200);
                    return () => clearTimeout(timer);
                }
            }, [wrongNoteId, feedbackMsg]);

            const handleFretClick = useCallback((stringIdx, fretIdx) => {
                if (gameState !== 'playing') return;

                const noteId = `${stringIdx}-${fretIdx}`;
                const clickedNote = NOTES[(STRING_TUNINGS[stringIdx] + fretIdx) % 12];
                const isCorrect = targetNotes.includes(clickedNote);

                // --- Modus: VERFOLGUNGSJAGD ---
                if (gameMode === 'chase') {
                    if (!playerPos) {
                        // 1. Klick im Chase Modus bestimmt den Start
                        if (isCorrect) {
                            setPlayerPos({ s: stringIdx, f: fretIdx });
                            setFoundNotes([noteId]);
                            // Lehrer weit weg spawnen
                            const spawnFret = fretIdx < 8 ? 17 : 0;
                            const spawnString = Math.floor(Math.random() * 6);
                            setTeacherPos({ s: spawnString, f: spawnFret });
                        } else {
                            setMistakes(prev => prev + 1);
                            setWrongNoteId(noteId);
                            setFeedbackMsg("Muss ein korrekter Start-Ton sein!");
                        }
                        return;
                    }

                    // Bewegungs-Check (nur angrenzende Felder)
                    const rowDiff = Math.abs(playerPos.s - stringIdx);
                    const colDiff = Math.abs(playerPos.f - fretIdx);
                    
                    if (rowDiff > 1 || colDiff > 1) {
                        setFeedbackMsg("Nur benachbarte Felder!");
                        return;
                    }

                    // Auf gleiches Feld geklickt? Ignorieren
                    if (rowDiff === 0 && colDiff === 0) return;

                    if (isCorrect) {
                        // Richtig und erreichbar -> hinbewegen
                        setPlayerPos({ s: stringIdx, f: fretIdx });
                        if (!foundNotes.includes(noteId)) {
                            setFoundNotes(prev => [...prev, noteId]);
                        }
                    } else {
                        // Falsch, aber erreichbar -> Fehler, Lehrer beschleunigt
                        setMistakes(prev => prev + 1);
                        setWrongNoteId(noteId);
                        setFeedbackMsg("Falsch! Lehrer wird schneller!");
                        setTeacherSpeed(prev => Math.max(300, prev * 0.8)); // 20% schneller pro Fehler
                    }
                } 
                // --- Modus: KLASSISCH ---
                else {
                    if (foundNotes.includes(noteId)) return;

                    if (isCorrect) {
                        setFoundNotes(prev => [...prev, noteId]);
                    } else {
                        setMistakes(prev => prev + 1);
                        setWrongNoteId(noteId);
                        setFeedbackMsg(clickedNote);
                    }
                }
            }, [gameState, gameMode, foundNotes, targetNotes, playerPos]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            return (
                <div className="fixed inset-0 bg-[#121212] text-slate-100 flex flex-col font-sans overflow-hidden select-none">
                    
                    {/* --- HUD / TOP BAR --- */}
                    <div className="h-16 bg-[#1e1e1e] border-b border-white/10 flex items-center justify-between px-3 md:px-6 shadow-xl z-30 shrink-0">
                        
                        {/* Tonart Anzeige */}
                        <div className="flex items-center gap-2 md:gap-3 bg-white/5 px-3 py-1.5 rounded-lg border border-white/10">
                            <IconMusic size={18} className="text-indigo-400 hidden sm:block" />
                            <div className="flex flex-col">
                                <span className="text-[10px] uppercase tracking-wider text-slate-400 leading-none">Tonart</span>
                                <span className="text-sm md:text-lg font-black text-indigo-400 leading-none mt-1">
                                    {gameState === 'idle' ? '---' : `${currentScale.root} ${currentScale.type}`}
                                </span>
                            </div>
                        </div>

                        {/* Spielstatistiken */}
                        {gameState !== 'idle' && (
                            <div className="flex items-center gap-4 md:gap-8">
                                <div className="flex flex-col items-center">
                                    <span className="text-[10px] uppercase tracking-wider text-slate-400 leading-none">Zeit</span>
                                    <div className="flex items-center gap-1 text-sm md:text-lg font-black mt-1 leading-none text-slate-200">
                                        <IconTimer size={16} />
                                        {formatTime(timeElapsed)}
                                    </div>
                                </div>

                                <div className="flex flex-col items-center">
                                    <span className="text-[10px] uppercase tracking-wider text-slate-400 leading-none">Töne</span>
                                    <span className="text-sm md:text-lg font-black text-emerald-400 mt-1 leading-none">
                                        {foundNotes.length} / {totalTargetCount}
                                    </span>
                                </div>

                                {gameMode === 'chase' && (
                                    <div className="hidden sm:flex flex-col items-center relative">
                                        <span className="text-[10px] uppercase tracking-wider text-slate-400 leading-none">Tempo Lehrer</span>
                                        <div className="flex items-center gap-1 text-sm md:text-lg font-black text-orange-400 mt-1 leading-none">
                                            {(2000 / teacherSpeed).toFixed(1)}x
                                        </div>
                                    </div>
                                )}

                                <div className="flex flex-col items-center relative">
                                    <span className="text-[10px] uppercase tracking-wider text-slate-400 leading-none">Fehler</span>
                                    <div className="flex items-center gap-1 text-sm md:text-lg font-black text-rose-400 mt-1 leading-none">
                                        <IconAlert size={16} />
                                        {mistakes}
                                    </div>
                                    {feedbackMsg && (
                                        <div className="absolute top-full mt-2 left-1/2 -translate-x-1/2 bg-rose-600 text-white text-xs font-bold py-1 px-3 rounded-md shadow-lg whitespace-nowrap z-50 pointer-events-none" style={{animation: 'slideDown 0.2s ease-out forwards'}}>
                                            {feedbackMsg}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Aktionen */}
                        <div className="flex items-center gap-2">
                            {/* Modus Toggle wenn Idle */}
                            {gameState === 'idle' && (
                                <div className="hidden md:flex bg-slate-800 rounded-lg p-1 mr-2 border border-slate-700">
                                    <button onClick={() => setGameMode('classic')} className={`px-3 py-1 text-sm font-bold rounded-md transition-colors ${gameMode === 'classic' ? 'bg-indigo-500 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Klassisch</button>
                                    <button onClick={() => setGameMode('chase')} className={`px-3 py-1 text-sm font-bold rounded-md transition-colors ${gameMode === 'chase' ? 'bg-rose-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Verfolgung</button>
                                </div>
                            )}

                            <button onClick={toggleFullscreen} className="p-2 md:px-3 md:py-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 text-slate-300 rounded-lg transition-colors border border-slate-700" title="Vollbild umschalten">
                                {isFullscreen ? <IconMinimize size={18} /> : <IconMaximize size={18} />}
                            </button>

                            <button onClick={startGame} className="flex items-center gap-1.5 md:gap-2 px-3 md:px-5 py-2 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white rounded-lg font-bold text-sm md:text-base transition-colors shadow-md">
                                {gameState === 'idle' ? <IconPlay size={18} /> : <IconRotate size={18} />}
                                <span className="hidden xs:inline">{gameState === 'idle' ? 'Start' : 'Neustart'}</span>
                            </button>
                        </div>
                    </div>

                    {/* Hint-Banner für Chase Modus (vor dem ersten Klick) */}
                    {gameState === 'playing' && gameMode === 'chase' && !playerPos && (
                        <div className="absolute top-20 left-1/2 -translate-x-1/2 z-40 bg-cyan-600/90 backdrop-blur text-white px-6 py-2 rounded-full font-bold shadow-[0_0_20px_rgba(6,182,212,0.6)] animate-bounce pointer-events-none">
                            Wähle einen beliebigen passenden Ton als Startpunkt!
                        </div>
                    )}

                    {/* --- GRIFFBRETT BEREICH --- */}
                    <div className={`flex-1 w-full overflow-x-auto overflow-y-hidden relative custom-scrollbar ${gameState === 'idle' ? 'opacity-40 grayscale blur-[1px] pointer-events-none' : ''}`}>
                        
                        <div className="h-full relative bg-[#3E2723] flex flex-col border-y-8 border-[#2D1B13] shadow-inner box-border" style={{ width: 'max-content', minWidth: '100%' }}>
                            
                            {/* HINTERGRUND: Bundstäbchen */}
                            <div className="absolute inset-0 flex" style={{ paddingLeft: `${NUT_WIDTH}px` }}>
                                {FRET_WIDTHS.map((fretWidth, i) => {
                                    const fretNum = i + 1;
                                    const hasSingleDot = [3, 5, 7, 9, 15, 17].includes(fretNum);
                                    const hasDoubleDot = fretNum === 12;
                                    
                                    return (
                                        <div key={i} className="border-r-[4px] border-[#B0BEC5] shadow-[1px_0_2px_rgba(0,0,0,0.8)] relative flex items-center justify-center z-0" style={{ width: `${fretWidth}px`, flexShrink: 0 }}>
                                            {hasSingleDot && <div className="absolute w-5 h-5 md:w-7 md:h-7 bg-[#E0E0E0] rounded-full opacity-60 shadow-inner"></div>}
                                            {hasDoubleDot && (
                                                <div className="absolute flex flex-col gap-12 md:gap-16">
                                                    <div className="w-5 h-5 md:w-7 md:h-7 bg-[#E0E0E0] rounded-full opacity-60 shadow-inner"></div>
                                                    <div className="w-5 h-5 md:w-7 md:h-7 bg-[#E0E0E0] rounded-full opacity-60 shadow-inner"></div>
                                                </div>
                                            )}
                                            <div className="absolute bottom-1 text-sm md:text-base font-bold text-white/30">{fretNum}</div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* SATTEL */}
                            <div className="absolute left-0 top-0 bottom-0 bg-[#E0E0E0] border-r-[6px] border-[#9E9E9E] z-0 flex flex-col justify-end pb-1 shadow-[2px_0_5px_rgba(0,0,0,0.5)]" style={{ width: `${NUT_WIDTH}px` }}>
                                <div className="w-full text-center text-sm md:text-base font-bold text-black/40 mb-1">0</div>
                            </div>

                            {/* VORDERGRUND: Saiten & Touch-Zonen */}
                            <div className="relative z-10 flex flex-col h-full w-max min-w-full">
                                {STRING_TUNINGS.map((baseNoteIdx, stringIdx) => (
                                    <div key={stringIdx} className="flex-1 flex items-center relative group/string w-max">
                                        
                                        <div className="absolute left-0 right-0 bg-gradient-to-b from-[#EEEEEE] to-[#9E9E9E] shadow-[0_2px_4px_rgba(0,0,0,0.8)] pointer-events-none" style={{ height: `${(stringIdx * 0.6) + 1.5}px`, zIndex: -1 }}></div>

                                        <div className="h-full flex items-center justify-center cursor-pointer relative" style={{ width: `${NUT_WIDTH}px`, flexShrink: 0 }} onClick={() => handleFretClick(stringIdx, 0)}>
                                            <NoteMarker 
                                                isFound={foundNotes.includes(`${stringIdx}-0`)} 
                                                isWrong={wrongNoteId === `${stringIdx}-0`}
                                                note={NOTES[baseNoteIdx % 12]} 
                                                isPlayer={playerPos?.s === stringIdx && playerPos?.f === 0}
                                                isTeacher={teacherPos?.s === stringIdx && teacherPos?.f === 0}
                                            />
                                            <div className="absolute inset-x-1 inset-y-0 active:bg-white/20 rounded-md transition-colors duration-75"></div>
                                        </div>

                                        {FRET_WIDTHS.map((fretWidth, i) => {
                                            const fretIdx = i + 1;
                                            const noteId = `${stringIdx}-${fretIdx}`;
                                            const isFound = foundNotes.includes(noteId);
                                            const isWrong = wrongNoteId === noteId;
                                            const note = NOTES[(baseNoteIdx + fretIdx) % 12];

                                            return (
                                                <div key={fretIdx} className="h-full flex items-center justify-center cursor-pointer relative" style={{ width: `${fretWidth}px`, flexShrink: 0 }} onClick={() => handleFretClick(stringIdx, fretIdx)}>
                                                    <NoteMarker 
                                                        isFound={isFound} 
                                                        isWrong={isWrong} 
                                                        note={note} 
                                                        isPlayer={playerPos?.s === stringIdx && playerPos?.f === fretIdx}
                                                        isTeacher={teacherPos?.s === stringIdx && teacherPos?.f === fretIdx}
                                                    />
                                                    {!isFound && !isWrong && (
                                                        <div className="absolute inset-x-0 inset-y-1 md:hover:bg-white/10 active:bg-white/20 transition-colors duration-75 z-10 rounded-sm"></div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* --- IDLE OVERLAY --- */}
                    {gameState === 'idle' && (
                        <div className="absolute inset-0 z-40 flex items-center justify-center pointer-events-none">
                            <div className="bg-slate-900/85 backdrop-blur-md p-6 md:p-8 rounded-2xl border border-slate-700 text-center shadow-2xl pointer-events-auto max-w-md mx-4" style={{animation: 'zoomIn 0.3s ease-out forwards'}}>
                                
                                <div className="flex gap-2 justify-center mb-6 bg-slate-800 p-1.5 rounded-xl border border-slate-700">
                                    <button onClick={() => setGameMode('classic')} className={`flex-1 py-2 rounded-lg font-bold transition-all ${gameMode === 'classic' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`}>Klassisch</button>
                                    <button onClick={() => setGameMode('chase')} className={`flex-1 py-2 rounded-lg font-bold transition-all ${gameMode === 'chase' ? 'bg-rose-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`}>Verfolgungsjagd</button>
                                </div>

                                {gameMode === 'classic' ? (
                                    <>
                                        <IconMusic size={48} className="mx-auto text-indigo-500 mb-4" />
                                        <h2 className="text-2xl font-black text-white mb-2">Modus: Klassisch</h2>
                                        <p className="text-slate-300 mb-6 text-sm">Finde alle passenden Töne einer generierten Tonart auf dem gesamten Griffbrett. Die Zeit läuft!</p>
                                    </>
                                ) : (
                                    <>
                                        <span className="text-5xl block mb-4 drop-shadow-md">👨‍🏫</span>
                                        <h2 className="text-2xl font-black text-rose-400 mb-2">Modus: Verfolgungsjagd</h2>
                                        <p className="text-slate-300 mb-6 text-sm">Der Lehrer jagt dich! Setze einen Startpunkt. Bewege dich dann Feld für Feld (auch diagonal) über passende Noten. Ein falscher Ton = der Lehrer wird schneller!</p>
                                    </>
                                )}

                                <button onClick={startGame} className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition-colors shadow-lg flex items-center justify-center gap-2">
                                    <IconPlay size={20} /> Spiel Starten <br>(am besten im Querformat)
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- WIN OVERLAY --- */}
                    {gameState === 'won' && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
                            <div className="bg-[#1e1e1e] border border-emerald-500/30 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl" style={{animation: 'zoomIn 0.3s ease-out forwards'}}>
                                <div className="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(16,185,129,0.3)]">
                                    <IconTrophy size={40} className="text-emerald-400" />
                                </div>
                                <h2 className="text-3xl font-black text-white mb-2">Perfekt!</h2>
                                <p className="text-slate-400 mb-6">Du hast alle Töne in <strong className="text-white">{formatTime(timeElapsed)}</strong> gefunden. <br/><br/> Fehler: <strong className="text-white">{mistakes}</strong></p>
                                <button onClick={startGame} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold transition-colors shadow-lg">
                                    Nächste Runde
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- LOSE OVERLAY (nur im Chase Modus) --- */}
                    {gameState === 'lost' && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
                            <div className="bg-[#1e1e1e] border border-rose-500/30 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl" style={{animation: 'zoomIn 0.3s ease-out forwards'}}>
                                <div className="w-20 h-20 bg-rose-500/20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(244,63,94,0.3)]">
                                    <IconSkull size={40} className="text-rose-400" />
                                </div>
                                <h2 className="text-3xl font-black text-rose-400 mb-2">Erwischt!</h2>
                                <p className="text-slate-400 mb-6">Der Musiklehrer hat dich eingeholt. <br/><br/> Du konntest <strong className="text-white">{foundNotes.length} von {totalTargetCount}</strong> Tönen aufdecken.</p>
                                <button onClick={startGame} className="w-full py-4 bg-rose-600 hover:bg-rose-500 text-white rounded-xl font-bold transition-colors shadow-lg">
                                    Nochmal versuchen
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
